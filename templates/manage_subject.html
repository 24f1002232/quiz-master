{%extends 'base.html' %}

{%block title %} Manage Subjects {%endblock %}

{%block content %}
<h1>Manage Users</h1>

<table class="table border">
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>
    {%for user in users %}
    <tr>
        <td>{{user.name}}</td>
        <td>{{user.email}}</td>
        <td>
            <a class="btn btn-danger" href="{{ url_for('delete_user',id=user.id )}}">Delete</a>
        </td>
    </tr>
    {%endfor %}
</table>
{%endblock %}
