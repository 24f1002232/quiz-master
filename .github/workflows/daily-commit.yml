name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 02:30 UTC
  workflow_dispatch:       # Allows manual triggering

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 24f1002232@ds.study.iitm.ac.in - Update daily log
        run: |
          mkdir -p logs
          echo "Daily update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> logs/daily-log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/daily-log.txt
          git commit -m "chore: automated daily update $(date -u '+%Y-%m-%d')"
          git push
